<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acode Web キャストコントローラー</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: #fff; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; background: #1e1e1e; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        h1 { font-size: 1.5rem; color: #4caf50; }
        button { background: #4caf50; color: white; border: none; padding: 15px 24px; font-size: 1rem; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 15px; font-weight: bold; }
        button:hover { background: #45a049; }
        .info { font-size: 0.85rem; color: #aaa; margin-top: 15px; text-align: left; background: #2a2a2a; padding: 10px; border-radius: 6px; }
    </style>
    <!-- 正しいSDKの読み込み -->
    <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
</head>
<body>

<div class="container">
    <h1>📡 Acode Cast</h1>
    <p>同じWi-Fiのテレビに接続します</p>
    
    <button id="castBtn">📺 テレビにキャストする</button>

    <div class="info">
        <strong>【確認事項】</strong><br>
        1. 必ず <strong>https://</strong> でアクセスしてください<br>
        2. デバイスとテレビが同じWi-Fiにあるか確認<br>
        3. Chromeブラウザを使用してください
    </div>
</div>

<script>
    // SDKの初期化
    window.__onGCastApiAvailable = function(isAvailable) {
        if (isAvailable) {
            const context = cast.framework.CastContext.getInstance();
            context.setOptions({
                receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
                autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGINAL_SCOPED
            });
            console.log("Cast SDK Ready");
        }
    };

    // キャストボタンの動作
    document.getElementById('castBtn').addEventListener('click', () => {
        try {
            const context = cast.framework.CastContext.getInstance();
            context.requestSession()
                .then(() => {
                    alert("接続成功！");
                })
                .catch((error) => {
                    console.error("キャストエラー:", error);
                    alert("接続できませんでした。Wi-Fiまたは環境を確認してください。");
                });
        } catch (e) {
            alert("キャスト機能が利用できません。Chromeで開いているか確認してください。");
        }
    });
</script>

</body>
</html>
